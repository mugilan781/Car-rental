<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your DriveElite account to manage bookings, track rentals, and access exclusive member benefits.">
  <title>Login — DriveElite</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/sprite.svg#icon-car">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/utilities.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/pages/login.css">
</head>
<body class="login-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content" class="auth-shell">
    
    <!-- BRAND LOGO -->
    <div class="login-header">
      <a href="index.html" class="login-logo" aria-label="Drive Elite Home">
        <div class="login-logo-icon">DE</div>
        Drive<span>Elite</span>
      </a>
      <h1 class="login-title">Welcome <span class="highlight">Back</span></h1>
      <p class="login-subtitle">Sign in to continue your premium driving experience.</p>
    </div>

    <!-- LOGIN CARD -->
    <div class="login-card">
      <form class="auth-form" id="login-form" novalidate>
        
        <!-- Email Field -->
        <div class="form-group">
          <label for="login-email">Email Address <span class="required">*</span></label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </span>
            <input type="email" id="login-email" class="form-input" placeholder="john@example.com" required autocomplete="email">
          </div>
          <span class="form-error" id="email-error">Please enter a valid email address.</span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="login-password">Password <span class="required">*</span></label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password" title="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span class="form-error" id="password-error">Password must be at least 8 characters.</span>
        </div>

        <!-- Remember / Forgot Row -->
        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me">
            Remember me
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn--primary btn--lg submit-btn" id="login-btn">
          Sign In
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 2px;">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>

      </form>

      <!-- Social login divider -->
      <div class="social-divider">
        <span class="divider-line"></span>
        <span class="divider-text">OR CONTINUE WITH</span>
        <span class="divider-line"></span>
      </div>

      <!-- Social login buttons -->
      <div class="social-buttons">
        
        <!-- Google button -->
        <button type="button" class="social-btn" id="google-login-btn">
          <!-- Official multicolor Google G SVG -->
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Apple button -->
        <button type="button" class="social-btn" id="apple-login-btn">
          <!-- Official Apple monochrome SVG -->
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z"/>
          </svg>
          Continue with Apple
        </button>

      </div>
    </div>

    <!-- REGISTER FOOTER LINK -->
    <div class="login-footer">
      Don't have an account? <a href="register.html">Create Account</a>
    </div>

  </main>

  <div class="toast-container" id="toast-container"></div>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/validation.js"></script>
  <script src="assets/js/animation.js"></script>
  <script>
  (function() {
    'use strict';

    /* ---- Password Visibility Toggle ---- */
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('login-password');
    if (toggleBtn && passwordInput) {
      toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        
        // Update SVG inside the button
        toggleBtn.innerHTML = isPassword 
          ? `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>` 
          : `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>`;
            
        toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        toggleBtn.title = isPassword ? 'Hide password' : 'Show password';
      });
    }

    /* ---- Client Side Validation and Form Submissions ---- */
    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('login-email');
    const passwordInputEl = document.getElementById('login-password');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');

    if (loginForm && emailInput && passwordInputEl) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();

        let isValid = true;

        // Simple Email Verification
        const emailVal = emailInput.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(emailVal)) {
          emailInput.classList.add('error');
          if (emailError) emailError.classList.add('visible');
          isValid = false;
        } else {
          emailInput.classList.remove('error');
          if (emailError) emailError.classList.remove('visible');
        }

        // Simple Password Verification
        const passwordVal = passwordInputEl.value;
        if (passwordVal.length < 8) {
          passwordInputEl.classList.add('error');
          if (passwordError) passwordError.classList.add('visible');
          isValid = false;
        } else {
          passwordInputEl.classList.remove('error');
          if (passwordError) passwordError.classList.remove('visible');
        }

        if (isValid) {
          // Trigger successful login feedback and redirect to dashboard
          if (typeof UI !== 'undefined' && UI.showToast) {
            UI.showToast({
              title: 'Success',
              message: 'Signing in to your DriveElite dashboard...',
              type: 'success',
              duration: 2000
            });
          }
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        }
      });

      // Realtime validation clear on focus
      emailInput.addEventListener('focus', () => {
        emailInput.classList.remove('error');
        if (emailError) emailError.classList.remove('visible');
      });

      passwordInputEl.addEventListener('focus', () => {
        passwordInputEl.classList.remove('error');
        if (passwordError) passwordError.classList.remove('visible');
      });
    }

    /* ---- Google / Apple Authentication hooks ---- */
    const googleBtn = document.getElementById('google-login-btn');
    const appleBtn = document.getElementById('apple-login-btn');

    if (googleBtn) {
      googleBtn.addEventListener('click', () => {
        // OAuth Google Login Integration placeholder
        if (typeof UI !== 'undefined' && UI.showToast) {
          UI.showToast({
            title: 'Google Login',
            message: 'Connecting to Google OAuth account services...',
            type: 'info',
            duration: 3000
          });
        }
      });
    }

    if (appleBtn) {
      appleBtn.addEventListener('click', () => {
        // OAuth Apple Login Integration placeholder
        if (typeof UI !== 'undefined' && UI.showToast) {
          UI.showToast({
            title: 'Apple Login',
            message: 'Connecting to Apple ID account services...',
            type: 'info',
            duration: 3000
          });
        }
      });
    }

  })();
  </script>
</body>
</html>
