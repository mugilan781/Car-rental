<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The page you are looking for does not exist. Return to JET CABS home or browse our luxury fleet.">
  <title>Page Not Found (404) — JET CABS</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/sprite.svg#icon-car">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/utilities.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/pages/home.css">
  
  <style>
    /* 404 Page Center Layout & Design System Alignment */
    body {
      background: var(--color-bg); /* Soft ivory background from index.html */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* Ambient Gold/Blue Lighting */
    .glow-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    
    .glow-circle-gold {
      position: absolute;
      top: 25%;
      left: 20%;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(198, 169, 98, 0.05) 0%, rgba(198, 169, 98, 0) 70%);
      filter: blur(100px);
      animation: float-slow 15s ease-in-out infinite alternate;
    }

    .glow-circle-blue {
      position: absolute;
      bottom: 25%;
      right: 20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(27, 59, 95, 0.03) 0%, rgba(27, 59, 95, 0) 70%);
      filter: blur(120px);
      animation: float-slow-reverse 18s ease-in-out infinite alternate;
    }

    .glow-hero-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(198, 169, 98, 0.08) 0%, rgba(198, 169, 98, 0) 65%);
      filter: blur(60px);
      z-index: 1;
      pointer-events: none;
      animation: gentle-pulse 6s ease-in-out infinite alternate;
    }

    /* Faint Top-to-bottom Gradient */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(250, 250, 248, 0) 0%, rgba(245, 245, 243, 0.5) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .error-page {
      position: relative;
      z-index: 3;
      width: 100%;
      padding: var(--space-12) var(--space-6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* JET CABS logo area and spacing */
    .error-logo {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-8);
      animation: fade-in-logo 0.8s ease-out forwards;
    }
    
    .error-logo .navbar__logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Visually center the content slightly shifted down */
    .error-content {
      margin-top: var(--space-4) !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade-up-premium 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Spacing between sections */
    .error-content .section-header__badge {
      margin-bottom: var(--space-6) !important;
    }

    /* Hero 404 code with display serif font */
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 12rem);
      line-height: 0.85;
      font-weight: var(--fw-regular);
      color: var(--color-primary); /* Premium blue */
      margin: 0 0 var(--space-8) 0;
      letter-spacing: -0.01em;
      text-shadow: 0 15px 35px rgba(27, 59, 95, 0.03);
    }

    .error-content .section-header__title {
      margin-bottom: var(--space-5) !important;
      font-size: clamp(1.625rem, 5vw, 2.25rem);
      font-weight: var(--fw-regular); /* Reuses home page typography weights */
      letter-spacing: -0.02em;
    }

    .error-content .section-header__subtitle {
      max-width: 440px;
      margin: 0 auto var(--space-12) auto !important;
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--color-light-text);
    }

    /* CTA buttons layout */
    .error-actions {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      width: 100%;
    }

    .error-actions .btn {
      min-width: 180px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-size: var(--fs-small);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all var(--transition-smooth);
    }

    /* Animation Keyframes */
    @keyframes float-slow {
      0% { transform: translate(-20px, -20px) scale(1); }
      100% { transform: translate(20px, 20px) scale(1.05); }
    }
    
    @keyframes float-slow-reverse {
      0% { transform: translate(20px, 20px) scale(1); }
      100% { transform: translate(-20px, -20px) scale(1.05); }
    }

    @keyframes gentle-pulse {
      0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    @keyframes fade-up-premium {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in-logo {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive adjustments */
    @media (max-width: 576px) {
      .error-actions {
        flex-direction: column;
        align-items: center;
        gap: var(--space-3);
      }
      .error-actions .btn {
        width: 100%;
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Ambient Luxury Blur Circles -->
  <div class="glow-bg">
    <div class="glow-circle-gold"></div>
    <div class="glow-circle-blue"></div>
  </div>
  
  <div class="glow-hero-center"></div>

  <main class="error-page" id="main-content">
    <div class="container">
      
      <!-- Centered Logo -->
      <div class="error-logo">
        <a href="index.html" class="navbar__logo">
          <span class="navbar__logo-text"><span>JET</span> CABS</span>
        </a>
      </div>

      <!-- Section Header Container (reusing home page section header layout) -->
      <div class="section-header error-content">
        <div class="section-header__badge">Page Not Found</div>
        
        <!-- Large 404 Display -->
        <h1 class="error-code">404</h1>
        
        <h2 class="section-header__title">Looks Like You Took a Wrong Turn</h2>
        <p class="section-header__subtitle">
          The page you're looking for doesn't exist,<br>
          may have been moved, or is temporarily unavailable.
        </p>

        <!-- CTA Buttons -->
        <div class="error-actions">
          <a href="index.html" class="btn btn--primary">Return Home</a>
          <a href="cars.html" class="btn btn--outline">Browse Cars</a>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
